name: Check PNGs

on:
  pull_request:
    paths:
      - 'Maps of the entire US/**/*.html'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Check that PNGs are up to date
        run: python png-generator/generate-pngs.py --check
