    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #map {
            width: 100%;
            height: 100%;
            max-width: 1100px;
            max-height: 100%;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .label {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            font-weight: bold;
            fill: #333333;
            text-anchor: middle;
            pointer-events: none;
        }
        .callout-line {
            stroke: #333333;
            stroke-width: 0.75;
            fill: none;
            pointer-events: none;
        }
        g.state path,
        g.state circle,
        path.dc,
        circle.dc {
            transition: stroke-width 0.1s ease;
            cursor: pointer;
        }
        g.state path:hover,
        g.state circle:hover,
        path.dc:hover,
        circle.dc:hover {
            stroke-width: 2;
            stroke: #000;
        }
        #tooltip {
            position: absolute;
            display: none;
            background: #fff;
            color: #333;
            border: 1px solid #666;
            padding: 6px 10px;
            font-size: 13px;
            font-family: Arial, Helvetica, sans-serif;
            pointer-events: none;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.25);
            z-index: 1000;
            white-space: nowrap;
            border-radius: 3px;
        }
    </style>
</head>

  <text class="legend-text" x="716" y="810" dy="0.35em">Split / No Trifecta</text>
</g>
</svg>
    </div>
<div id="tooltip"></div>
<script>
(function() {
  const stateNames = {
    al: "Alabama", ak: "Alaska", az: "Arizona", ar: "Arkansas",
    ca: "California", co: "Colorado", ct: "Connecticut", de: "Delaware",
    fl: "Florida", ga: "Georgia", hi: "Hawaii", id: "Idaho",
    il: "Illinois", in: "Indiana", ia: "Iowa", ks: "Kansas",
    ky: "Kentucky", la: "Louisiana", me: "Maine", md: "Maryland",
    ma: "Massachusetts", mi: "Michigan", mn: "Minnesota", ms: "Mississippi",
    mo: "Missouri", mt: "Montana", ne: "Nebraska", nv: "Nevada",
    nh: "New Hampshire", nj: "New Jersey", nm: "New Mexico", ny: "New York",
    nc: "North Carolina", nd: "North Dakota", oh: "Ohio", ok: "Oklahoma",
    or: "Oregon", pa: "Pennsylvania", ri: "Rhode Island", sc: "South Carolina",
    sd: "South Dakota", tn: "Tennessee", tx: "Texas", ut: "Utah",
    vt: "Vermont", va: "Virginia", wa: "Washington", wv: "West Virginia",
    wi: "Wisconsin", wy: "Wyoming", dc: "District of Columbia"
  };

  const colorToStatus = {
    '#ef5350': 'Republican Trifecta',
    '#42a5f5': 'Democratic Trifecta',
    '#ba68c8': 'Split / No Trifecta',
    'rgb(239, 83, 80)': 'Republican Trifecta',
    'rgb(66, 165, 245)': 'Democratic Trifecta',
    'rgb(186, 104, 200)': 'Split / No Trifecta'
  };

  const tooltip = document.getElementById('tooltip');
  if (!tooltip) return;

  const svg = document.querySelector('#map svg');
  if (!svg) return;

  // Include both paths and the DC circle
  const elements = svg.querySelectorAll('path, circle');
  elements.forEach(el => {
    let code = '';
    const classes = (el.getAttribute('class') || '').split(/\s+/);
    for (let c of classes) {
      if (c.length === 2 && stateNames[c]) {
        code = c;
        break;
      }
    }
    if (!code) return;

    function showTooltip(e) {
      const fill = window.getComputedStyle(el).fill.toLowerCase().trim();
      const status = colorToStatus[fill] || 'Unknown';
      const name = stateNames[code];
      tooltip.innerHTML = '<strong>' + name + '</strong><br>' + status;
      tooltip.style.display = 'block';
      positionTooltip(e);
    }

    function positionTooltip(e) {
      let x = e.pageX + 15;
      let y = e.pageY + 15;
      const rect = tooltip.getBoundingClientRect();
      if (x + rect.width > window.innerWidth + window.scrollX) {
        x = e.pageX - rect.width - 15;
      }
      if (y + rect.height > window.innerHeight + window.scrollY) {
        y = e.pageY - rect.height - 15;
      }
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    el.addEventListener('mouseenter', showTooltip);
    el.addEventListener('mousemove', positionTooltip);
    el.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
})();
</script>
</body>
</html>
